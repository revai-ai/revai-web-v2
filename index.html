      content="Automatizujeme procesy pomocí AI – hlasoví asistenti, AI automatizace interních workflow, emailová automatizace a custom APP development"

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Automatizace pomocí AI – Řešení na míru" />

      property="og:description"
      content="Automatizujeme procesy pomocí AI – hlasové asistenty, AI automatizace interních workflow, emailová automatizace a custom APP development"

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Automatizace pomocí AI – Řešení na míru" />

      name="twitter:description"
      content="Automatizujeme procesy pomocí AI – hlasové asistenty, AI automatizace interních workflow, emailová automatizace a custom APP development"
    />

      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+420608024655",

        "https://www.linkedin.com/company/amai-ai",

    <script
